<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Cross-cloud portfolio architecture diagram</title>
  <desc>Architecture showing browser connecting to AWS CloudFront and S3, which connects via JavaScript to Azure Functions and Table Storage, with Grafana Cloud monitoring both clouds, and GitHub Actions deploying to both.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; font-weight: 400; fill: #555; }
      .c-gray rect { fill: #F1EFE8; stroke: #B4B2A9; }
      .c-amber rect { fill: #FAEEDA; stroke: #EF9F27; }
      .c-blue rect { fill: #E6F1FB; stroke: #378ADD; }
      .c-teal rect { fill: #E1F5EE; stroke: #1D9E75; }
      .c-coral rect { fill: #FAECE7; stroke: #D85A30; }
      .c-gray .th, .c-gray .ts { fill: #444441; }
      .c-amber .th, .c-amber .ts { fill: #633806; }
      .c-blue .th, .c-blue .ts { fill: #0C447C; }
      .c-teal .th, .c-teal .ts { fill: #085041; }
      .c-coral .th, .c-coral .ts { fill: #712B13; }
    </style>
  </defs>

  <!-- Browser -->
  <g class="c-gray">
    <rect x="260" y="20" width="160" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Browser</text>
  </g>

  <!-- AWS region container -->
  <rect x="40" y="110" width="260" height="160" rx="12" fill="none" stroke="#EF9F27" stroke-width="0.5" stroke-dasharray="6 3" opacity="0.6"/>
  <text class="ts" x="52" y="127" fill="#EF9F27" opacity="0.9">AWS · eu-west-2</text>

  <!-- CloudFront -->
  <g class="c-amber">
    <rect x="60" y="135" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="155" text-anchor="middle" dominant-baseline="central">CloudFront</text>
    <text class="ts" x="140" y="173" text-anchor="middle" dominant-baseline="central">CDN + HTTPS + headers</text>
  </g>

  <!-- S3 -->
  <g class="c-amber">
    <rect x="60" y="207" width="160" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="224" text-anchor="middle" dominant-baseline="central">S3 Bucket</text>
    <text class="ts" x="140" y="240" text-anchor="middle" dominant-baseline="central">Static site</text>
  </g>

  <!-- Azure region container -->
  <rect x="380" y="110" width="260" height="230" rx="12" fill="none" stroke="#378ADD" stroke-width="0.5" stroke-dasharray="6 3" opacity="0.6"/>
  <text class="ts" x="392" y="127" fill="#378ADD" opacity="0.9">Azure · West Europe</text>

  <!-- Azure Functions -->
  <g class="c-blue">
    <rect x="400" y="135" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="155" text-anchor="middle" dominant-baseline="central">Azure Functions</text>
    <text class="ts" x="510" y="173" text-anchor="middle" dominant-baseline="central">/visitor_count · /health · /system_check</text>
  </g>

  <!-- Table Storage -->
  <g class="c-blue">
    <rect x="400" y="207" width="220" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="224" text-anchor="middle" dominant-baseline="central">Table Storage</text>
    <text class="ts" x="510" y="240" text-anchor="middle" dominant-baseline="central">Visitor count persistence</text>
  </g>

  <!-- Resource Group label -->
  <rect x="400" y="265" width="220" height="60" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="ts" x="510" y="285" text-anchor="middle" dominant-baseline="central" opacity="0.6">Resource Group</text>
  <text class="ts" x="510" y="305" text-anchor="middle" dominant-baseline="central" opacity="0.6">cloud-portfolio-rg</text>

  <!-- Terraform state container -->
  <rect x="40" y="360" width="260" height="80" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.6"/>
  <text class="ts" x="52" y="378" opacity="0.6">Terraform state</text>
  <g class="c-gray">
    <rect x="58" y="385" width="100" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="108" y="403" text-anchor="middle" dominant-baseline="central">S3 backend</text>
  </g>
  <g class="c-gray">
    <rect x="172" y="385" width="110" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="227" y="403" text-anchor="middle" dominant-baseline="central">DynamoDB lock</text>
  </g>

  <!-- GitHub Actions -->
  <g class="c-teal">
    <rect x="230" y="470" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="490" text-anchor="middle" dominant-baseline="central">GitHub Actions</text>
    <text class="ts" x="340" y="508" text-anchor="middle" dominant-baseline="central">deploy-aws.yml · deploy-azure.yml</text>
  </g>

  <!-- Grafana -->
  <g class="c-coral">
    <rect x="230" y="554" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="574" text-anchor="middle" dominant-baseline="central">Grafana Cloud</text>
    <text class="ts" x="340" y="592" text-anchor="middle" dominant-baseline="central">CloudWatch + Azure Monitor</text>
  </g>

  <!-- Arrows -->
  <path d="M300 64 L180 135" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M380 64 L510 135" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="140" y1="187" x2="140" y2="207" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="187" x2="510" y2="207" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M290 470 Q180 430 140 290" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M390 470 Q530 430 510 295" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M280 554 Q120 520 120 290" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)" opacity="0.5"/>
  <path d="M400 554 Q560 520 560 295" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)" opacity="0.5"/>

  <!-- Labels -->
  <text class="ts" x="400" y="88" text-anchor="middle" opacity="0.6">JS fetch()</text>
  <text class="ts" x="188" y="445" text-anchor="middle" opacity="0.6">deploy</text>
  <text class="ts" x="492" y="445" text-anchor="middle" opacity="0.6">deploy</text>
  <text class="ts" x="96" y="540" text-anchor="middle" opacity="0.5">monitor</text>
  <text class="ts" x="580" y="540" text-anchor="middle" opacity="0.5">monitor</text>
</svg>
